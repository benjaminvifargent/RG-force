<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GRIP</title>
    <link rel="stylesheet" href="/static/style.css">

    <script src="/static/socket.io.js"></script>
</head>

<body>
    <div id="app">
        <header class="header">
            <img src="/static/logoWAT.svg" alt="Logo WAT" class="logo">
            <h1>THE GRIP</h1>
        </header>

        <main class="main-content">
            <!-- Colonne de Gauche : Action -->
            <section class="panel main-action">
                <!-- Zone d'Action Initiale : Enregistrement -->
                <div id="registration-zone" class="form-container">
                    <h2>Mesure la force de ton grip</h2>
                    <div class="input-group">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="20" height="20" class="picto-svg">
                            <path
                                d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 32C79.8 288 0 367.8 0 466.7C0 491.7 20.3 512 45.3 512h357.4c25 0 45.3-20.3 45.3-45.3c0-98.9-79.8-178.7-178.3-178.7h-90.1z" />
                        </svg>
                        <input type="text" id="pseudo" placeholder="Pseudo" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="20" height="20" class="picto-svg">
                            <path
                                d="M160 112c0-35.3 28.7-64 64-64s64 28.7 64 64v48H160V112zm-48 48H48c-26.5 0-48 21.5-48 48v208c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V208c0-26.5-21.5-48-48-48h-64v-48C336 48.4 287.6 0 224 0S112 48.4 112 112v48z" />
                        </svg>
                        <input type="number" id="age" placeholder="Âge" autocomplete="off">
                    </div>
                    <button id="start-btn" class="btn-start">COMMENCER LE TEST</button>
                </div>

                <!-- Clavier Virtuel -->
                <div id="virtual-keyboard" class="keyboard hidden">
                    <div class="keyboard-row" data-row="0"></div>
                    <div class="keyboard-row" data-row="1"></div>
                    <div class="keyboard-row" data-row="2"></div>
                    <div class="keyboard-row" data-row="3"></div>
                    <div class="keyboard-row" data-row="4"></div>
                </div>

                <!-- Zone de Test : Live Feed -->
                <div id="test-zone" class="live-test">
                    <h2 id="alert-msg" class="alert-text">SERREZ LA RAQUETTE !</h2>

                    <div class="gauge-container">
                        <svg xmlns="http://www.w3.org/2000/svg" class="circular-gauge" viewBox="0 0 330 330">
                            <defs>
                                <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:var(--accent-green)" />
                                    <stop offset="50%" style="stop-color:var(--volt-yellow)" />
                                    <stop offset="100%" style="stop-color:var(--accent-orange)" />
                                </linearGradient>
                                <filter id="glow">
                                    <feGaussianBlur stdDeviation="5" result="coloredBlur" />
                                    <feMerge>
                                        <feMergeNode in="coloredBlur" />
                                        <feMergeNode in="SourceGraphic" />
                                    </feMerge>
                                </filter>
                            </defs>
                            <circle class="gauge-bg" cx="165" cy="165" r="140"></circle>
                            <circle class="gauge-fill" id="gauge-path" cx="165" cy="165" r="140"></circle>
                        </svg>
                        <div class="score-overlay">
                            <span class="score-val" id="current-score">0.0</span>
                            <span class="score-unit">KG</span>
                        </div>
                    </div>

                    <p id="test-instruction" style="color: var(--text-secondary); font-style: italic;">Puissance
                        maximale détectée...</p>

                    <div id="user-rank-container" class="final-rank-display hidden">
                        VOTRE RANG : <span id="user-rank">--</span>
                    </div>
                </div>
            </section>

            <!-- Colonne de Droite : Leaderboard -->
            <section class="panel leaderboard">
                <h2><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" width="24" height="24" class="leaderboard-icon">
                        <path
                            d="M400 0H176c-26.5 0-48 21.5-48 48v416c0 26.5 21.5 48 48 48h224c26.5 0 48-21.5 48-48V48c0-26.5-21.5-48-48-48zM288 416c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z" />
                    </svg> RANKING LEGEND</h2>

                <ul id="rank-list" class="rank-list">
                    <!-- Les lignes du classement seront générées par JS -->
                </ul>
            </section>
        </main>
    </div>

    <!-- Modal de Podium -->
    <div id="podium-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" width="60" height="60" class="modal-icon">
                    <path
                        d="M400 0H176c-26.5 0-48 21.5-48 48v416c0 26.5 21.5 48 48 48h224c26.5 0 48-21.5 48-48V48c0-26.5-21.5-48-48-48zM288 416c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z" />
                </svg>
                <h2 id="modal-title">NOUVEAU RECORD !</h2>
            </div>
            <div class="modal-body">
                <p><span id="modal-pseudo">Joueur</span>, vous entrez dans la légende à la</p>
                <div id="modal-rank" class="modal-rank-val">PREMIÈRE <br>PLACE</div>
            </div>
            <button id="close-modal" class="btn-modal">CONTINUER</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
